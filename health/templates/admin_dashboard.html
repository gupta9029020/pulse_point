<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">All Appointments</h2>
        <a href="/logout/" class="btn btn-outline-danger btn-sm">Logout</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            {% for appt in appointments %}
            <div class="border-bottom py-3 d-flex justify-content-between align-items-center">
                <div>
                    <div class="fw-bold text-primary">{{ appt.student }}</div>
                    <div class="text-muted">Doctor: {{ appt.doctor }}</div>
                </div>
                <span class="badge {% if appt.status == 'Pending' %}bg-warning text-dark{% elif appt.status == 'Approved' %}bg-success{% else %}bg-secondary{% endif %}">
                    {{ appt.status }}
                </span>
            </div>
            {% empty %}
            <p class="text-muted">No appointments found</p>
            {% endfor %}
        </div>
    </div>
</div>
