<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0 text-primary">Medicine Inventory</h2>
        <a href="/pharmacist/" class="btn btn-outline-secondary btn-sm">← Back</a>
    </div>

    <!-- SEARCH + SORT FORM -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form method="GET" class="row g-3 align-items-end">
                <div class="col-md-6">
                    <label class="form-label">Search</label>
                    <input type="text" name="q" class="form-control" value="{{ query }}" placeholder="Search Medicine">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Sort By</label>
                    <select name="sort" class="form-select">
                        <option value="">Default</option>
                        <option value="name_asc" {% if sort == "name_asc" %}selected{% endif %}>Name A-Z</option>
                        <option value="name_desc" {% if sort == "name_desc" %}selected{% endif %}>Name Z-A</option>
                        <option value="stock_asc" {% if sort == "stock_asc" %}selected{% endif %}>Stock Low-High</option>
                        <option value="stock_desc" {% if sort == "stock_desc" %}selected{% endif %}>Stock High-Low</option>
                    </select>
                </div>
                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-primary">Apply</button>
                </div>
            </form>
        </div>
    </div>

    {% if medicines|length == 0 %}
    <div class="alert alert-danger text-center">No Medicine Found</div>
    {% endif %}

    <!-- INVENTORY TABLE -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Medicine</th>
                            <th class="text-center">Stock</th>
                            <th class="text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for med in medicines %}
                        <tr>
                            <td class="fw-semibold">{{ med.name }}</td>
                            <td class="text-center">{{ med.stock }}</td>
                            <td class="text-center">
                                {% if med.stock < 10 %}
                                <span class="badge bg-danger">Low Stock</span>
                                {% elif med.stock < 30 %}
                                <span class="badge bg-warning text-dark">Moderate</span>
                                {% else %}
                                <span class="badge bg-success">In Stock</span>
                                {% endif %}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
