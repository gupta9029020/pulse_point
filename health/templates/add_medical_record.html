<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>
body{
    background-color:#f8f9fa;
}
.card{
    border:none;
    border-radius:15px;
}
.form-control{
    border-radius:10px;
}
.form-control:focus{
    box-shadow:0 0 0 0.15rem rgba(13,110,253,0.25);
}
.btn-success{
    border-radius:10px;
    padding:10px;
    font-weight:600;
    letter-spacing:0.5px;
}
label{
    font-weight:600;
    margin-bottom:6px;
}
</style>

<div class="container mt-5" style="max-width:650px">
    <div class="card shadow-lg p-3">
        <div class="card-body">
            <h3 class="mb-4 text-center fw-bold text-primary">Add Prescription</h3>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label>Diagnosis</label>
                    <textarea name="diagnosis" class="form-control" rows="3" placeholder="Enter diagnosis details..." required></textarea>
                </div>
                <div class="mb-3">
                    <label>Medicine</label>
                    <input type="text" name="medicine" class="form-control" placeholder="Enter medicine name" required>
                </div>
                <div class="mb-3">
                    <label>Quantity</label>
                    <input type="number" name="quantity" class="form-control" placeholder="Enter quantity" min="1" required>
                </div>
                <div class="mb-4">
                    <label>Doctor Notes</label>
                    <textarea name="notes" class="form-control" rows="3" placeholder="Additional notes (optional)"></textarea>
                </div>
                <button class="btn btn-success w-100">Save Prescription</button>
            </form>
        </div>
    </div>
</div>
