<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-4 text-end">
    <a href="/student/" class="btn btn-outline-secondary btn-sm">← Back</a>
</div>

<div class="container mt-2 d-flex justify-content-center">
    <div class="card shadow-lg p-4 rounded-4" style="width:500px;">
        <h2 class="text-center mb-4 fw-bold text-primary">Book Appointment</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Select Doctor</label>
                <select name="doctor" class="form-select" required>
                    <option value="">Choose doctor...</option>
                    {% for doctor in doctors %}
                    <option value="{{ doctor.id }}">Dr.{{ doctor.user.get_full_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Date</label>
                <input type="date" name="date" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Time</label>
                <input type="time" name="time" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Describe Your Issue (Optional)</label>
                <textarea name="note" placeholder="Example: Fever, headache, body pain" rows="3" class="form-control"></textarea>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-success rounded-pill">Book Appointment</button>
            </div>
        </form>
    </div>
</div>
